<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متابع العادات الذكي - تطبيقي الشخصي</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50;
            --primary: #27ae60; --accent: #7f8c8d; --border: #e0e6ed;
            --danger: #e74c3c; --success-light: rgba(39, 174, 96, 0.08);
        }
        .dark-mode {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --primary: #2ecc71; --accent: #a0a0a0; --border: #333333;
            --success-light: rgba(46, 204, 113, 0.15);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1450px; margin: auto; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* القسم العلوي: البروفايل والأدوات */
        .top-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; border-bottom: 2px solid var(--border); padding-bottom: 20px; }
        @media(max-width: 768px) { .top-section { grid-template-columns: 1fr; } }
        
        /* البروفايل */
        .profile-card { display: flex; align-items: center; gap: 15px; }
        .profile-img-container { position: relative; width: 80px; height: 80px; cursor: pointer; }
        .profile-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; border: 3px solid var(--primary); transition: 0.3s; }
        .profile-img:hover { opacity: 0.8; }
        .profile-info { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .profile-name { font-size: 1.2em; font-weight: bold; border: none; background: transparent; color: var(--text); outline: none; border-bottom: 1px dashed transparent; transition: 0.2s; }
        .profile-name:focus { border-bottom-color: var(--primary); }
        .profile-bio { font-size: 0.9em; color: var(--accent); border: none; background: transparent; outline: none; width: 100%; }
        
        /* أدوات التحكم */
        .tools-card { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 10px; }
        .date-section { display: flex; gap: 10px; }
        input[type="date"], input[type="text"].date-input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; }
        
        /* الإحصائيات */
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--bg); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
        .stat-num { font-size: 1.8em; font-weight: 800; display: block; color: var(--primary); margin-top: 5px; }

        /* الجدول */
        .table-wrap { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: var(--bg); color: var(--accent); padding: 12px 5px; }
        td { border: 1px solid var(--border); padding: 6px; text-align: center; }
        .habit-col { text-align: right; position: sticky; right: 0; background: var(--card); width: 140px; min-width: 140px; font-weight: 700; z-index: 5; border-left: 2px solid var(--border); }
        tr.checked-row { background-color: var(--success-light); }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--primary); }

        /* شريط التقدم */
        .prog-container { background: #e0e0e0; height: 12px; border-radius: 20px; overflow: hidden; margin-top: 10px; }
        .prog-fill { background: linear-gradient(90deg, var(--primary), #00b894); height: 100%; transition: 0.8s ease; }

        /* الأزرار والمؤقت */
        .btn { cursor: pointer; border: none; border-radius: 8px; padding: 10px 20px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3); }
        .action-icon { cursor: pointer; font-size: 16px; margin: 0 3px; transition: 0.2s; color: var(--accent); }
        .action-icon:hover { color: var(--primary); transform: scale(1.2); }
        #timerText { font-family: monospace; font-size: 20px; font-weight: bold; color: var(--danger); background: var(--bg); padding: 5px 15px; border-radius: 20px; }
        .timer-active { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* الفوتر (معلومات المطور) */
        .footer { margin-top: 30px; text-align: center; padding-top: 20px; border-top: 1px dashed var(--border); color: var(--accent); font-size: 14px; }
        .social-links { margin-top: 10px; display: flex; justify-content: center; gap: 15px; }
        .social-links a { color: var(--accent); font-size: 20px; transition: 0.3s; }
        .social-links a:hover { color: var(--primary); transform: translateY(-3px); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-section">
        <div class="profile-card">
            <div class="profile-img-container" title="اضغط لتغيير الصورة">
                <img src="https://via.placeholder.com/80" id="profileImg" class="profile-img" onclick="document.getElementById('imgUpload').click()">
                <input type="file" id="imgUpload" accept="image/*" style="display: none;" onchange="uploadImage(event)">
            </div>
            <div class="profile-info">
                <input type="text" id="userName" class="profile-name" placeholder="اسمك الكريم..." oninput="saveProfile()">
                <input type="text" id="userBio" class="profile-bio" placeholder="اكتب هدفك أو اقتباسك التحفيزي هنا..." oninput="saveProfile()">
            </div>
        </div>

        <div class="tools-card">
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="timerText">25:00</span>
                <button class="btn" style="background:var(--accent); color:white; padding:8px;" onclick="toggleDarkMode()" id="modeBtn"><i class="fas fa-moon"></i></button>
            </div>
            <div class="date-section">
                <input type="date" id="fullDate" onchange="saveDate()">
                <input type="text" id="hijriDate" class="date-input" placeholder="التاريخ الهجري" onchange="saveDate()">
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><span>العادات</span><span id="hCount" class="stat-num">0</span></div>
        <div class="stat-card"><span>إجمالي الإنجاز</span><span id="dCount" class="stat-num">0</span></div>
        <div class="stat-card" style="grid-column: span 2;">
            <div style="display:flex; justify-content:space-between; font-weight: bold;"><span>نسبة التقدم</span><span id="pText">0%</span></div>
            <div class="prog-container"><div id="mainProg" class="prog-fill"></div></div>
        </div>
    </div>

    <div style="display: flex; gap: 10px; margin-bottom: 25px;">
        <input type="text" id="habitInp" style="flex:1; padding:12px; font-size: 15px; border-radius: 8px; border:1px solid var(--border); background:var(--bg); color:var(--text)" placeholder="ما هي العادة الجديدة؟">
        <button onclick="addHabit()" class="btn btn-main"><i class="fas fa-plus"></i> إضافة</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr id="hRow"><th class="habit-col">قائمة العادات</th></tr>
            </thead>
            <tbody id="hBody"></tbody>
        </table>
    </div>

    <div class="footer">
        تم التطوير بكل ❤️ بواسطة <strong>[Ahmed Aref]</strong>
        <div class="social-links">
            <a href="#" target="_blank" title="X (Twitter)"><i class="fab fa-x-twitter"></i></a>
            <a href="https://www.instagram.com/ahmedd_aref/" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        </div>
    </div>
</div>

<script>
    // --- البيانات والمتغيرات ---
    let habits = JSON.parse(localStorage.getItem('habitsV5')) || [];
    let isDark = localStorage.getItem('darkV5') === 'true';
    let timerInterval;

    // إعداد رأس الجدول
    const hRow = document.getElementById('hRow');
    for(let i=1; i<=31; i++) hRow.innerHTML += `<th style="min-width:25px">${i}</th>`;
    hRow.innerHTML += '<th>تم</th><th>تحكم</th>';

    // --- الوظائف الأساسية (Render) ---
    function render() {
        document.body.classList.toggle('dark-mode', isDark);
        document.getElementById('modeBtn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
        
        const tbody = document.getElementById('hBody');
        tbody.innerHTML = '';
        let totalDone = 0;

        habits.forEach((h, idx) => {
            let done = 0;
            let tr = document.createElement('tr');
            let cells = `<td class="habit-col">${h.name}</td>`;
            
            for(let d=1; d<=31; d++) {
                const checked = h.history[d] ? 'checked' : '';
                if(h.history[d]) { done++; totalDone++; tr.classList.add('checked-row'); }
                cells += `<td><input type="checkbox" ${checked} onchange="toggle(${idx},${d})"></td>`;
            }
            cells += `<td style="font-weight:bold; color:var(--primary)">${done}</td>`;
            cells += `<td>
                <span class="action-icon" onclick="startTimer()" title="مؤقت 25 دقيقة"><i class="fas fa-stopwatch"></i></span>
                <span class="action-icon" onclick="delHabit(${idx})" title="حذف" style="color:var(--danger)"><i class="fas fa-trash"></i></span>
            </td>`;
            tr.innerHTML = cells;
            tbody.appendChild(tr);
        });

        updateStats(totalDone);
        loadProfileData();
    }

    // --- الإحصائيات ---
    function updateStats(totalDone) {
        const totalPossible = habits.length * 31;
        const percent = totalPossible > 0 ? (totalDone / totalPossible * 100) : 0;
        
        document.getElementById('hCount').innerText = habits.length;
        document.getElementById('dCount').innerText = totalDone;
        document.getElementById('pText').innerText = percent.toFixed(1) + '%';
        document.getElementById('mainProg').style.width = percent + '%';
    }

    // --- إدارة العادات ---
    function addHabit() {
        const inp = document.getElementById('habitInp');
        if(!inp.value.trim()) return;
        habits.push({ name: inp.value.trim(), history: {} });
        inp.value = ''; save();
    }
    function toggle(idx, day) { habits[idx].history[day] = !habits[idx].history[day]; save(); }
    function delHabit(idx) { if(confirm('حذف هذه العادة؟')) { habits.splice(idx, 1); save(); } }
    function save() { localStorage.setItem('habitsV5', JSON.stringify(habits)); render(); }

    // --- إدارة البروفايل والصورة ---
    function uploadImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profileImg').src = e.target.result;
                localStorage.setItem('profileImg', e.target.result);
            };
            reader.readAsDataURL(file);
        }
    }
    function saveProfile() {
        localStorage.setItem('userName', document.getElementById('userName').value);
        localStorage.setItem('userBio', document.getElementById('userBio').value);
    }
    function loadProfileData() {
        const savedImg = localStorage.getItem('profileImg');
        if(savedImg) document.getElementById('profileImg').src = savedImg;
        document.getElementById('userName').value = localStorage.getItem('userName') || '';
        document.getElementById('userBio').value = localStorage.getItem('userBio') || '';
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fullDate').value = localStorage.getItem('gDateV5') || today;
        document.getElementById('hijriDate').value = localStorage.getItem('hDateV5') || '';
    }
    function saveDate() { localStorage.setItem('gDateV5', document.getElementById('fullDate').value); localStorage.setItem('hDateV5', document.getElementById('hijriDate').value); }
    function toggleDarkMode() { isDark = !isDark; localStorage.setItem('darkV5', isDark); render(); }

    // --- التنبيه الصوتي والمؤقت ---
    function playBeep() {
        // إنشاء صوت تنبيه بدون ملفات خارجية لضمان عمله دائماً
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gainNode = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, ctx.currentTime);
        gainNode.gain.setValueAtTime(1, ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
        osc.connect(gainNode);
        gainNode.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 1);
    }

    function startTimer() {
        clearInterval(timerInterval);
        let s = 25 * 60; // 25 دقيقة
        const timerEl = document.getElementById('timerText');
        timerEl.classList.add('timer-active');
        
        timerInterval = setInterval(() => {
            let m = Math.floor(s / 60);
            let sec = s % 60;
            timerEl.innerText = `${m}:${sec < 10 ? '0'+sec : sec}`;
            if(s-- <= 0) { 
                clearInterval(timerInterval); 
                timerEl.classList.remove('timer-active');
                playBeep(); // تشغيل الصوت
                setTimeout(() => alert('⏰ انتهت الجلسة! خذ استراحة.'), 500); 
            }
        }, 1000);
    }

    // التشغيل المبدئي
    render();
</script>
</body>
</html>
